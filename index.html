<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Finanzas DanFL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 15px;
}

h1 {
    color: orange;
}

input, select, button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
}

button {
    background: orange;
    border: none;
    cursor: pointer;
}

.reset { background: red; }

.ingreso { background: #1b5e20; }
.gasto { background: #7f0000; }

.contenedor {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
}

.lista-box {
    width: 45%;
}

ul {
    padding: 0;
}

li {
    list-style: none;
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
}

/* 🔥 CONTENEDOR DEL GRÁFICO */
.grafico-container {
    width: 100%;
    max-width: 400px;
    height: 300px;
    margin: 20px auto;
    background: #1c1c1c;
    padding: 15px;
    border-radius: 12px;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){
    .contenedor{ 
        flex-direction: column; 
        align-items: center;
    }
    .lista-box{ 
        width:100%; 
    }
    input, select, button{
        width: 90%;
    }
}

canvas {
    width: 100% !important;
    height: 100% !important;
}
</style>
</head>

<body>

<h1>💰 Finanzas DanFL</h1>

<select id="tipo">
<option value="ingreso">Ingreso</option>
<option value="gasto">Gasto</option>
</select>

<input id="descripcion" placeholder="Descripción">
<input id="monto" type="number" placeholder="Monto">

<br>

<button onclick="agregar()">Agregar</button>
<button class="reset" onclick="reiniciar()">Reiniciar</button>

<h3>Ingresos: S/ <span id="ingresos">0</span></h3>
<h3>Gastos: S/ <span id="gastos">0</span></h3>
<h2>Balance: S/ <span id="balance">0</span></h2>

<h3>Filtro:</h3>
<button onclick="setFiltro('todos')">Todos</button>
<button onclick="setFiltro('semana')">Semana</button>
<button onclick="setFiltro('mes')">Mes</button>

<div class="grafico-container">
    <canvas id="grafico"></canvas>
</div>

<div class="contenedor">
<div class="lista-box">
<h3>🟢 Ingresos</h3>
<ul id="listaIngresos"></ul>
</div>

<div class="lista-box">
<h3>🔴 Gastos</h3>
<ul id="listaGastos"></ul>
</div>
</div>

<script>
let movimientos = JSON.parse(localStorage.getItem("movimientos")) || [];
let filtro = "todos";
let chart;

function agregar(){
    let tipo = tipo.value;
    let descripcion = descripcion.value;
    let monto = parseFloat(monto.value);

    if(!descripcion || isNaN(monto)) return alert("Completa datos");

    let fecha = new Date().toISOString();

    movimientos.push({tipo,descripcion,monto,fecha});
    localStorage.setItem("movimientos", JSON.stringify(movimientos));

    limpiar();
    mostrar();
}

function filtrar(){
    let ahora = new Date();

    return movimientos.filter(m=>{
        let f = new Date(m.fecha);

        if(filtro==="semana"){
            let diff = (ahora - f)/(1000*60*60*24);
            return diff <= 7;
        }

        if(filtro==="mes"){
            return f.getMonth()===ahora.getMonth() &&
                   f.getFullYear()===ahora.getFullYear();
        }

        return true;
    });
}

function mostrar(){
    listaIngresos.innerHTML="";
    listaGastos.innerHTML="";

    let ingresos=0, gastos=0;

    let datos = filtrar();

    datos.forEach((m,i)=>{
        let li=document.createElement("li");

        li.innerHTML = `
        <strong>${m.descripcion}</strong><br>
        S/ ${m.monto}<br>
        <small>${new Date(m.fecha).toLocaleString()}</small>
        <br>
        <button onclick="eliminar(${i})">X</button>
        `;

        if(m.tipo==="ingreso"){
            li.className="ingreso";
            listaIngresos.appendChild(li);
            ingresos+=m.monto;
        }else{
            li.className="gasto";
            listaGastos.appendChild(li);
            gastos+=m.monto;
        }
    });

    ingresosEl.textContent=ingresos;
    gastosEl.textContent=gastos;
    balanceEl.textContent=ingresos-gastos;

    actualizarGrafico(ingresos,gastos);
}

function actualizarGrafico(ingresos,gastos){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("grafico"), {
        type: 'doughnut',
        data: {
            labels: ['Ingresos','Gastos'],
            datasets: [{
                data: [ingresos, gastos],
                backgroundColor: ['#4caf50','#f44336']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: 'white'
                    }
                }
            }
        }
    });
}

function eliminar(i){
    movimientos.splice(i,1);
    localStorage.setItem("movimientos", JSON.stringify(movimientos));
    mostrar();
}

function reiniciar(){
    if(confirm("¿Borrar todo?")){
        movimientos=[];
        localStorage.removeItem("movimientos");
        mostrar();
    }
}

function setFiltro(f){
    filtro=f;
    mostrar();
}

function limpiar(){
    descripcion.value="";
    monto.value="";
}

let ingresosEl=ingresos, gastosEl=gastos, balanceEl=balance;

mostrar();
</script>

</body>
</html>

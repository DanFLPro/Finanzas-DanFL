<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💰 Finanzas MasterDan</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
}

input, select, button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
}

button {
    background: orange;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #ff9800;
}

.reset {
    background: red;
}

ul {
    padding: 0;
}

li {
    list-style: none;
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
}

.ingreso {
    background: #1b5e20;
}

.gasto {
    background: #7f0000;
}

.eliminar {
    background: black;
    margin-left: 10px;
    color: white;
}

.contenedor {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.lista-box {
    width: 45%;
}
</style>

</head>
<body>

<h1>💰 Finanzas MasterDan</h1>

<select id="tipo">
  <option value="ingreso">Ingreso</option>
  <option value="gasto">Gasto</option>
</select>

<input type="text" id="descripcion" placeholder="Descripción">
<input type="number" id="monto" placeholder="Monto">

<button onclick="agregar()">Agregar</button>
<button class="reset" onclick="reiniciar()">Reiniciar</button>

<h3>Ingresos: S/ <span id="ingresos">0</span></h3>
<h3>Gastos: S/ <span id="gastos">0</span></h3>
<h2>Balance: S/ <span id="balance">0</span></h2>

<div class="contenedor">
    <div class="lista-box">
        <h3>🟢 Ingresos</h3>
        <ul id="listaIngresos"></ul>
    </div>

    <div class="lista-box">
        <h3>🔴 Gastos</h3>
        <ul id="listaGastos"></ul>
    </div>
</div>

<script>
let movimientos = JSON.parse(localStorage.getItem("movimientos")) || [];

function agregar() {
    let tipo = document.getElementById("tipo").value;
    let descripcion = document.getElementById("descripcion").value;
    let monto = parseFloat(document.getElementById("monto").value);

    if (!descripcion || isNaN(monto)) {
        alert("Completa los datos correctamente");
        return;
    }

    let fecha = new Date().toLocaleString();

    let movimiento = {
        tipo,
        descripcion,
        monto,
        fecha
    };

    movimientos.push(movimiento);
    localStorage.setItem("movimientos", JSON.stringify(movimientos));

    limpiar();
    mostrar();
}

function mostrar() {
    let listaIngresos = document.getElementById("listaIngresos");
    let listaGastos = document.getElementById("listaGastos");

    listaIngresos.innerHTML = "";
    listaGastos.innerHTML = "";

    let ingresos = 0;
    let gastos = 0;

    movimientos.forEach((m, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <strong>${m.descripcion}</strong><br>
            S/ ${m.monto} <br>
            <small>${m.fecha}</small>
            <br>
            <button class="eliminar" onclick="eliminar(${index})">X</button>
        `;

        if (m.tipo === "ingreso") {
            li.classList.add("ingreso");
            listaIngresos.appendChild(li);
            ingresos += m.monto;
        } else {
            li.classList.add("gasto");
            listaGastos.appendChild(li);
            gastos += m.monto;
        }
    });

    document.getElementById("ingresos").textContent = ingresos;
    document.getElementById("gastos").textContent = gastos;
    document.getElementById("balance").textContent = ingresos - gastos;
}

function eliminar(index) {
    movimientos.splice(index, 1);
    localStorage.setItem("movimientos", JSON.stringify(movimientos));
    mostrar();
}

function reiniciar() {
    if (confirm("¿Seguro que quieres borrar todos los datos?")) {
        movimientos = [];
        localStorage.removeItem("movimientos");
        mostrar();
    }
}

function limpiar() {
    document.getElementById("descripcion").value = "";
    document.getElementById("monto").value = "";
}

mostrar();
</script>

</body>
</html>
